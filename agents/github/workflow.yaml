id: platform-github
name: Platform GitHub Agent Workflows

patterns:
  feature_pr:
    description: Feature branch to PR
    type: sequential
    steps:
      - id: branch-check
        action: verify_branch_safety
      - id: testing
        agent: platform-testing
        depends_on: [branch-check]
      - id: pr
        action: create_pull_request
        mcp: github-mcp
        depends_on: [testing]
      - id: ci
        action: monitor_ci_checks
        depends_on: [pr]

  release:
    description: Tag and release
    type: sequential
    steps:
      - id: testing
        agent: platform-testing
      - id: changelog
        action: generate_changelog
        depends_on: [testing]
      - id: release
        action: create_github_release
        mcp: github-mcp
        depends_on: [changelog]

handoffs:
  - from: platform-testing
    when: tests_pass
  - to: platform-devops
    when: merge_complete
