# Teknovo Auto-Orchestrator — Routing Rules Engine
# Consumed by orchestrator.js for dispatch decisions and parallel execution flags.

version: "1.0.0"
last_updated: "2026-06-20"

metadata:
  name: Teknovo Auto-Orchestrator Routing
  intent_map: intent-map.yaml
  entry: orchestrator.js

# Keywords that activate autonomous execution mode (no long plans, no unnecessary questions)
autonomous_triggers:
  - build
  - implement
  - create
  - develop
  - deploy
  - fix
  - add
  - setup
  - make
  - generate

execution_policy:
  ask_unnecessary_questions: false
  produce_long_plans: false
  stop_after_architecture: false
  create_and_modify_files: true
  run_builds: true
  fix_errors_until_complete: true
  max_retries: 10
  verification_skills:
    - teknovo-testing-architect
    - superpowers-verification-before-completion
  deployment_skill: teknovo-cloudflare-stack

deploy_keywords:
  - deploy
  - deployment
  - release
  - ship
  - cloudflare
  - pages
  - production
  - staging
  - dns
  - tunnel
  - publish

parallel_dispatch:
  min_domains_for_auto_parallel: 3
  separable_pairs:
    - name: frontend_backend
      domains: [frontend, backend]
      agents: [platform-frontend, platform-backend]
    - name: implementation_testing
      domains: [implementation, testing]
      agents: [platform-backend, platform-testing]
  auto_parallel_when:
    - condition: domain_count_gte
      value: 3
      description: Three or more distinct domain intents detected
    - condition: frontend_backend_separable
      description: Frontend and backend workstreams have non-overlapping file boundaries
    - condition: testing_independent
      description: Testing can run in parallel after contracts are defined
  max_parallel_siblings: 3

routes:

  landing_page:
    priority: 10
    keywords:
      - landing page
      - landing
      - website
      - school website
      - company profile
      - marketing site
      - situs sekolah
    intent: landing_page
    skills:
      - teknovo-chief-architect
      - teknovo-landing-page
      - teknovo-ui-ux
      - teknovo-testing-architect
      - teknovo-cloudflare-stack
    agents:
      - chief-architect
      - platform-frontend
      - platform-testing
    parallel: true
    parallel_groups:
      - group: 1
        workstreams: [architecture, frontend]
      - group: 2
        workstreams: [verification]
        depends_on: [architecture]

  finance:
    priority: 10
    keywords:
      - finance
      - accounting
      - school finance
      - bos
      - payroll
      - billing
      - tagihan
    intent: finance
    skills:
      - teknovo-chief-architect
      - teknovo-finance
      - teknovo-database-architect
      - teknovo-backend-development
      - teknovo-rbac-architect
      - teknovo-testing-architect
      - teknovo-security-review
    agents:
      - chief-architect
      - platform-backend
      - platform-testing
    parallel: false
    parallel_groups:
      - group: 1
        workstreams: [architecture]
      - group: 2
        workstreams: [domain]
        depends_on: [architecture]
      - group: 3
        workstreams: [security_testing]
        depends_on: [domain]

  ppdb:
    priority: 10
    keywords:
      - ppdb
      - admission
      - student registration
      - pendaftaran
      - calon siswa
    intent: ppdb
    skills:
      - teknovo-chief-architect
      - teknovo-ppdb
      - teknovo-backend-development
      - teknovo-database-architect
      - teknovo-testing-architect
    agents:
      - chief-architect
      - platform-backend
      - platform-testing
    parallel: false

  sarpras:
    priority: 10
    keywords:
      - sarpras
      - inventory
      - asset
      - facility management
      - inventaris
      - sarana prasarana
    intent: sarpras
    skills:
      - teknovo-chief-architect
      - teknovo-database-architect
      - teknovo-backend-development
      - teknovo-reporting
      - teknovo-testing-architect
    agents:
      - chief-architect
      - platform-backend
      - platform-testing
    parallel: false

  deployment:
    priority: 20
    keywords:
      - deploy
      - release
      - ship
      - cloudflare
      - production
    intent: null
    overlay: true
    skills:
      - teknovo-cloudflare-stack
      - teknovo-devops-engineer
      - gstack-ship
    agents:
      - platform-devops
      - platform-cloudflare
    parallel: false

multi_domain_combinations:
  - domains: [finance, ppdb]
    execution_mode: parallel
    note: Independent domain modules — parallel after shared architecture gate
  - domains: [finance, sarpras]
    execution_mode: parallel
  - domains: [ppdb, sarpras]
    execution_mode: parallel
  - domains: [landing_page, ppdb]
    execution_mode: parallel
    note: Frontend landing + backend PPDB can run as sibling agents
