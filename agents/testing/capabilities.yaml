id: platform-testing
name: Platform Testing Agent

capabilities:
  - id: unit-tests
    description: Jest/Vitest unit test suites
  - id: integration-tests
    description: API and service integration tests
  - id: e2e-tests
    description: Playwright browser E2E flows
  - id: build-verify
    description: tsc, lint, build verification
  - id: performance
    description: Lighthouse and performance audits
  - id: coverage
    description: Coverage reporting and gap analysis

skills:
  required:
    - id: teknovo-testing-architect
      path: .agents/skills/teknovo-testing-architect/SKILL.md
  recommended:
    - id: gstack-qa
      path: .agents/skills/gstack/qa/SKILL.md
    - id: gstack-browser-testing
      path: .agents/skills/gstack/browser-testing/SKILL.md
    - id: superpowers-verification-before-completion
      path: .agents/skills/superpowers/verification-before-completion/SKILL.md

dependencies:
  agents:
    - orchestrator
  mcps:
    required:
      - filesystem-mcp
      - shell-mcp
    recommended:
      - git-mcp
      - postgres-mcp
