      id: teknovo-testing-architect
  recommended:
    - path: .agents/skills/gstack/qa/SKILL.md
      id: gstack-qa

routing_keywords:
  - test
  - unit test
  - integration test
  - e2e
  - playwright
  - jest
  - vitest
  - lighthouse
  - coverage
