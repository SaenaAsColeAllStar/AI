id: platform-cloudflare
name: Platform Cloudflare Agent Workflows

patterns:
  pages_deploy:
    description: Standard Pages production deploy
    type: sequential
    steps:
      - id: testing-gate
        agent: platform-testing
      - id: security
        action: security_pre_deploy_review
        depends_on: [testing-gate]
      - id: deploy
        action: cloudflare_pages_deploy
        mcp: cloudflare-mcp
        depends_on: [security]
      - id: ssl
        action: verify_ssl_certificate
        depends_on: [deploy]
      - id: health
        action: verify_health_endpoints
        depends_on: [ssl]

  dns_setup:
    description: DNS and domain attach
    type: sequential
    steps:
      - id: dns
        action: configure_dns_records
        mcp: cloudflare-mcp
      - id: domain
        action: attach_custom_domain
        depends_on: [dns]
      - id: ssl
        action: verify_ssl
        depends_on: [domain]

handoffs:
  - from: platform-testing
    when: tests_pass
  - to: orchestrator
    when: deploy_complete
