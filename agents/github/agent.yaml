id: platform-github
name: Platform GitHub Agent
type: platform
contract_version: "1.0"
description: Repository, branch, PR, releases, issues, and project automation.
path: agents/github/AGENT.md
entry: agents/github/index.js
config: agents/github/config.yaml
priority: high

dependencies:
  agents:
    - orchestrator
    - platform-testing
  shared: []

required_mcps:
  required:
    - github-mcp
    - filesystem-mcp
  recommended:
    - git-mcp

skills:
  required:
    - path: .agents/skills/teknovo-devops-engineer/SKILL.md
      id: teknovo-devops-engineer
  recommended:
    - path: .agents/skills/gstack/ship/SKILL.md
      id: gstack-ship

routing_keywords:
  - github
  - pr
  - pull request
  - branch
  - release
  - issue
  - merge
  - repository
